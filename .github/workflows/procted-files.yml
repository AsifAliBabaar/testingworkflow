name: Protect Critical Files

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # fetch all history to do proper diff

      - name: Check for unauthorized changes
        run: |
          # List of protected files
          PROTECTED_FILES=".env .gitignore .lintstagedrc.js .husky"

          # Fetch allowed users from GitHub secret
          IFS=',' read -r -a ALLOWED_USERS <<< "${{ secrets.ALLOWED_USERS }}"

          # Get PR author
          PR_AUTHOR=$(jq -r .pull_request.user.login "$GITHUB_EVENT_PATH")
          echo "PR author: $PR_AUTHOR"

          # Check if any protected files changed
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          PROTECTED_CHANGED=false
          for file in $PROTECTED_FILES; do
            if echo "$CHANGED_FILES" | grep -q "^$file$"; then
              echo "⚠️ Protected file changed: $file"
              PROTECTED_CHANGED=true
            fi
          done

          # Block if unauthorized
          if [[ "$PROTECTED_CHANGED" = true ]]; then
            if [[ ! " ${ALLOWED_USERS[@]} " =~ " ${PR_AUTHOR} " ]]; then
              echo "❌ Unauthorized user '$PR_AUTHOR' tried to modify protected files."
              exit 1
            else
              echo "✅ Authorized user '$PR_AUTHOR' modified protected files."
            fi
          else
            echo "✅ No protected files modified."
          fi
